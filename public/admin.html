    <!-- ═══════════════════════════════════════════════════════════════════════
         SCRIPTS DO PAINEL ADMINISTRATIVO
         Ordem de dependência (não alterar): app-config → text-date-utils →
         contatos-loja-publica → campaign-utils → componentes (rodapé, store-closed-vitrina, admin/ui) →

         catalog → core-globals → script.js (sob demanda) → app-admin.js

         atualizar ?v=20260518-225751 neste HTML para invalidar cache (stamp-version).

         IMPORTANTE: Todos os scripts devem estar em ./js-build/ (transpilados)
         Live Server e Firebase Hosting não conseguem executar JSX direto.
         ═══════════════════════════════════════════════════════════════════════ -->
    <script defer src="./js-build/core/config/app-config.js?v=20260518-225751"></script>
    <script defer src="./js-build/core/utils/text-date-utils.js?v=20260518-225751"></script>
