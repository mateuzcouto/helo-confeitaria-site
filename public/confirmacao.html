<!doctype html>
<!--
  Confirmação PIX — Helô Confeitaria
  Retorno após checkout InfinitePay: ouve Firestore até status Pago.
  Deploy via mesmo fluxo da vitrine (prepare:hosting atualiza ?v=20260518-222624 em todos os HTML stampados).
-->
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagamento PIX — Helô Confeitaria</title>
    <meta name="deploy-version" content="20260518-222624" />
    <!-- Reconcilia HTML cacheado (WebView Instagram) com deploy-version.json antes dos scripts. -->
    <script>
      (function () {
        var CHAVE_SESSAO = 'helo_deploy_checked';
        function obterVersaoLocal() {
          var m = document.querySelector('meta[name="deploy-version"]');
          return m && m.content ? String(m.content).trim() : '';
        }
        function verificarDeployRemoto() {
          var local = obterVersaoLocal();
          if (!local) return;
          var heloParam = null;
          try {
            heloParam = new URLSearchParams(location.search).get('_helo');
          } catch (e) { /* URLSearchParams indisponível */ }
          fetch('./deploy-version.json?_=' + Date.now(), { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (dados) {
              if (!dados || !dados.version) return;
              var remota = String(dados.version).trim();
              if (!remota || local === remota) {
                try { sessionStorage.setItem(CHAVE_SESSAO, remota || local); } catch (e) {}
                return;
              }
              if (heloParam === remota) {
                try { sessionStorage.setItem(CHAVE_SESSAO, remota); } catch (e) {}
                return;
              }
              try {
                if (sessionStorage.getItem(CHAVE_SESSAO) === remota) return;
                sessionStorage.setItem(CHAVE_SESSAO, remota);
              } catch (e) {}
              location.replace(
                location.pathname + '?_helo=' + encodeURIComponent(remota) + location.hash
              );
            })
            .catch(function () {});
        }
        verificarDeployRemoto();
        window.addEventListener('pageshow', function (ev) {
          if (ev.persisted) verificarDeployRemoto();
        });
      })();
    </script>
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./css/style.css?v=20260518-222624" />
    <script defer src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script defer src="./js-build/core/config/app-config.js?v=20260518-222624"></script>
    <script defer src="./js-build/app.js?v=20260518-222624"></script>
    <script defer src="./js-build/confirmacao.js?v=20260518-222624"></script>
  </head>
  <body class="pagina-confirmacao-pix">
    <main
      id="confirmacao-pix-raiz"
      style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; background: linear-gradient(165deg, #fefcf8 0%, #f1f5f9 100%);"
      aria-live="polite"
    >
      <div
        style="max-width: 28rem; width: 100%; background: #fff; border-radius: 1rem; box-shadow: 0 10px 40px rgba(42, 61, 93, 0.12); padding: 2rem 1.5rem; text-align: center;"
      >
        <p style="font-family: var(--font-display, Georgia, serif); font-size: 1.35rem; color: var(--primary, #2a3d5d); margin: 0 0 1rem;">
          Helô Confeitaria
        </p>
        <div id="confirmacao-pix-conteudo"></div>
      </div>
      <p style="margin-top: 1.25rem; font-size: 12px; color: var(--s500, #64748b);">
        <a href="./index.html" style="color: var(--primary, #2a3d5d); font-weight: 600;">Voltar ao cardápio</a>
      </p>
    </main>
  </body>
</html>
